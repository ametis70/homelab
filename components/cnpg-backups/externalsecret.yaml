---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backups-s3
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: cnpg-backups-s3
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: accessKeyId
      remoteRef:
        key: cnpg_S3_KEY_ID
    - secretKey: secretAccessKey
      remoteRef:
        key: cnpg_S3_KEY_SECRET
