---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: collabora-headers
  namespace: nextcloud
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      X-Forwarded-Host: "collabora.${DOMAIN}"
    customResponseHeaders:
      X-Frame-Options: ""  # Allow framing from Nextcloud
