---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: docker-mailserver
  namespace: mail
spec:
  chart:
    spec:
      chart: charts/docker-mailserver
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: docker-mailserver
  interval: 24h0m0s
  values:
    certificate: mail-tls-certificate-rsa
    deployment:
      env:
        OVERRIDE_HOSTNAME: ${DOMAIN}
        POSTMASTER_ADDRESS: ${POSTMASTER_ADDRESS}
        ENABLE_FAIL2BAN: 1
