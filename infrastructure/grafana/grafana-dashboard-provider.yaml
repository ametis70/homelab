apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: grafana
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'k8s-sidecar'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: false
        options:
          path: /tmp/dashboards
          foldersFromFilesStructure: true
