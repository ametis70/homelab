---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator
  namespace: prometheus-system
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      version: 75.15.1
  interval: 24h0m0s
  values:
    # Prometheus Operator configuration
    prometheusOperator:
      resources:
        limits:
          cpu: 200m
          memory: 200Mi
        requests:
          cpu: 100m
          memory: 100Mi

    # Prometheus configuration
    prometheus:
      prometheusSpec:
        retention: 14d
        retentionSize: 7GB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 8Gi
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 500m

    # Disable components we already have separately
    alertmanager:
      enabled: false

    grafana:
      enabled: false
      # Deploy only dashboards/ConfigMaps for consumption by Grafana Operator
      forceDeployDashboards: true
      defaultDashboardsEnabled: true

    # Enable essential monitoring components
    prometheus-node-exporter:
      enabled: true

    kube-state-metrics:
      enabled: true

