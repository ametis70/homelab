---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: thanos
  namespace: thanos-system
spec:
  chart:
    spec:
      chart: thanos
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      version: 17.3.1
  interval: 24h0m0s
  values:
    query:
      enabled: true
      replicaCount: 1
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 512Mi

    storegateway:
      enabled: true
      replicaCount: 1
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 512Mi
      persistence:
        enabled: false

    compactor:
      enabled: true
      replicaCount: 1
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 512Mi
      persistence:
        enabled: true
        storageClass: longhorn
        size: 1Gi
      retentionResolutionRaw: 30d
      retentionResolution5m: 90d
      retentionResolution1h: 180d

    queryFrontend:
      enabled: false
    ruler:
      enabled: false
    minio:
      enabled: false

    existingObjstoreSecret: thanos-objstore-secrets

    securityContext:
      enabled: true
      runAsUser: 1001
      fsGroup: 1001

    podSecurityContext:
      enabled: true
      fsGroup: 1001
