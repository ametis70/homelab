apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: node-feature-discovery
  name: node-feature-discovery
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: node-feature-discovery
      sourceRef:
        kind: HelmRepository
        name: kubernetes-sigs-nfd
        namespace: flux-system
      version: 0.17.3
  values:
    enableNodeFeatureApi: true

    master:
      replicas: 1

    worker:
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute

      config:
        core:
          sleepInterval: 0s
          sources:
            - cpu
            - kernel
            - memory
            - network
            - pci
            - storage
            - system
            - usb
            - custom
            - local

