apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flux-web-ui
  namespace: flux-system
spec:
  routes:
    - match: Host(`flux.${TLD}`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: authentik
      services:
        - name: flux-web
          port: 9080
