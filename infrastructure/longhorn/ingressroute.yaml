apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-dashboard
  namespace: longhorn-system
spec:
  routes:
    - match: Host(`longhorn.${TLD}`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: authentik
      services:
        - name: longhorn-frontend
          port: 80
