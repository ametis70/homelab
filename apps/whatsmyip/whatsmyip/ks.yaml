---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: whatsmyip
spec:
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  path: ./apps/whatsmyip/whatsmyip/resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: whatsmyip
  dependsOn:
    - name: traefik
  postBuild:
    substituteFrom:
      - kind: Secret
        name: ingress-secrets-system
        optional: false