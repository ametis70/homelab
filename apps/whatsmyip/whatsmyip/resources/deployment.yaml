apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsmyip
  namespace: whatsmyip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whatsmyip
  template:
    metadata:
      labels:
        app: whatsmyip
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: whatsmyip-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: whatsmyip-config
  namespace: whatsmyip
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                           '$status $body_bytes_sent "$http_referer" '
                           '"$http_user_agent" "$http_x_forwarded_for" '
                           '"$http_x_real_ip" "$http_x_forwarded_proto"';
        
        access_log /var/log/nginx/access.log detailed;
        
        server {
            listen 80;
            location / {
                return 200 'Client IP Information:\nRemote Address: $remote_addr\nX-Forwarded-For: $http_x_forwarded_for\nX-Real-IP: $http_x_real_ip\nX-Forwarded-Proto: $http_x_forwarded_proto\nUser-Agent: $http_user_agent\n';
                add_header Content-Type text/plain;
            }
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: whatsmyip
  namespace: whatsmyip
spec:
  selector:
    app: whatsmyip
  ports:
  - port: 80
    targetPort: 80 