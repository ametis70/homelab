apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: ai
  name: openwebui
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: open-webui
      sourceRef:
        kind: HelmRepository
        name: open-webui
      version: 14.8.0
  valuesFrom:
    - kind: Secret
      name: pg-secrets
      valuesKey: username
      targetPath: extraEnvVars[0].value
    - kind: Secret
      name: pg-secrets
      valuesKey: password
      targetPath: extraEnvVars[1].value
    - kind: Secret
      name: openwebui-secrets
      valuesKey: secret-key
      targetPath: extraEnvVars[2].value
  values:
    replicaCount: 1

    # Ollama - disabled, using external
    ollama:
      enabled: false

    websocket:
      enabled: true
      manager: redis
      redis:
        enabled: true
        image:
          repository: valkey/valkey
          tag: 9.1.0-alpine3.23@sha256:c9b77919daeba2c02ad954d0c844cc4e7142069d177b89c5fd771f405daf9e02

    tika:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2000Mi

    persistence:
      enabled: true
      existingClaim: openwebui-data
      size: 5Gi
      storageClass: longhorn

    ingress:
      enabled: false

    # Environment variables
    extraEnvVars:
      - name: PGVECTOR_USER
        value: "" # Placeholder, will be populated by valuesFrom
      - name: PGVECTOR_PASSWORD
        value: "" # Placeholder, will be populated by valuesFrom
      - name: WEBUI_SECRET_KEY
        value: "" # Placeholder, will be populated by valuesFrom
      - name: PGVECTOR_DB_URL
        value: "postgresql://$(PGVECTOR_USER):$(PGVECTOR_PASSWORD)@openwebui-postgres-rw:5432/openwebui"
      - name: VECTOR_DB
        value: "pgvector"
      - name: OLLAMA_BASE_URL
        value: "http://external-ollama.traefik.svc.cluster.local:11434"
      - name: ENABLE_OLLAMA_API
        value: "true"
      - name: DATABASE_URL
        value: "postgresql://$(PGVECTOR_USER):$(PGVECTOR_PASSWORD)@openwebui-postgres-rw:5432/openwebui"
      - name: CORS_ALLOW_ORIGIN
        value: "https://openwebui.${DOMAIN}"
      - name: RAG_EMBEDDING_ENGINE
        value: "ollama"
      - name: RAG_EMBEDDING_MODEL
        value: "nomic-embed-text:latest"
