apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: immich
  name: immich
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: immich
      sourceRef:
        kind: HelmRepository
        name: immich
      version: 0.11.1
  valuesFrom:
    - kind: Secret
      name: pg-secrets
      valuesKey: password
      targetPath: controllers.main.containers.main.env.DB_PASSWORD
    - kind: Secret
      name: pg-secrets
      valuesKey: username
      targetPath: controllers.main.containers.main.env.DB_USERNAME
  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.2.3
            env:
              DB_HOSTNAME: immich-postgres-rw
              DB_DATABASE_NAME: immich

    valkey:
      enabled: true

    immich:
      metrics:
        enabled: false
      persistence:
        library:
          existingClaim: immich-library-pvc

    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          storageClass: longhorn-ephemeral
          size: 10Gi
