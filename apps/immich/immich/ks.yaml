---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
spec:
  interval: 24h
  retryInterval: 2m
  timeout: 8m
  path: ./apps/immich/immich/resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: immich
  dependsOn:
    - name: cluster-secrets
      namespace: flux-system
    - name: traefik
      namespace: traefik
    - name: cloudnative-pg-operator
      namespace: cloudnative-pg
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
        optional: false