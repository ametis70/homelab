apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
  namespace: immich
spec:
  instances: 3
  imageName: ghcr.io/tensorchord/cloudnative-pgvecto.rs:16-0.2.1
  primaryUpdateStrategy: unsupervised
  storage:
    size: 20Gi
    storageClass: longhorn
  superuserSecret:
    name: &secret pg-secrets
  postgresql:
    parameters:
      shared_preload_libraries: vectors.so
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: *secret
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS "vectors";
        - ALTER SYSTEM SET search_path TO "$user", public, vectors;
  monitoring:
    enablePodMonitor: true