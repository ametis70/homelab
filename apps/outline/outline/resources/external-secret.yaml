---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-secrets
  namespace: outline
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: auth-secrets
    template:
      type: Opaque
  data:
    - secretKey: client_id
      remoteRef:
        key: /outline/OIDC_CLIENT_ID
    - secretKey: client_secret
      remoteRef:
        key: /outline/OIDC_CLIENT_SECRET
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mail-secrets
  namespace: outline
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: mail-secrets
    template:
      type: Opaque
  data:
    - secretKey: username
      remoteRef:
        key: /outline/MAIL_USERNAME
    - secretKey: password
      remoteRef:
        key: /outline/MAIL_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pg-secrets
  namespace: outline
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: pg-secrets
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: /outline/PG_USERNAME
    - secretKey: password
      remoteRef:
        key: /outline/PG_PASSWORD
