apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: outline
  name: outline
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: outline
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: flux-system
      version: 0.8.1
  valuesFrom:
    - kind: Secret
      name: auth-secrets
      valuesKey: client_id
      targetPath: auth.oidc.clientId
    - kind: Secret
      name: pg-secrets
      valuesKey: username
      targetPath: externalPostgresql.username

  values:
    replicaCount: 1
    url: https://outline.${DOMAIN}

    redis:
      enabled: false

    externalRedis:
      host: outline-valkey
      port: 6379

    postgresql:
      enabled: false

    minio:
      enabled: false

    externalPostgresql:
      host: outline-postgres-rw
      # username: secret
      database: outline
      port: 5432
      existingSecret: pg-secrets
      passwordSecretKey: password

    extraEnvVars:
      FILE_STORAGE: local
      FILE_STORAGE_LOCAL_ROOT_DIR: /var/lib/outline/data

    smtp:
      host: mail.${DOMAIN}
      port: 465
      fromEmail: outline@${DOMAIN}
      replyEmail: no-reply@${DOMAIN}
      secure: true
      existingSecret:
        name: mail-secrets
        usernameKey: username
        passwordKey: password

    fileStorage:
      mode: local
      local:
        rootDir: /var/lib/outline/data
        persistence:
          enabled: true
          accessModes:
            - ReadWriteOnce
          existingClaim: outline-files
          size: 2Gi
          storageClass: longhorn

    auth:
      oidc:
        enabled: true
        # clientId: secret
        authUri: "https://authentik.${DOMAIN}/application/o/authorize/"
        tokenUri: "https://authentik.${DOMAIN}/application/o/token/"
        userInfoUri: "https://authentik.${DOMAIN}/application/o/userinfo/"
        logoutUri: "https://authentik.${DOMAIN}/application/o/outline/end-session/"
        usernameClaim: preferred_username
        displayName: "Authentik"
        scopes:
          - openid
          - profile
          - email
        existingSecret:
          name: "auth-secrets"
          clientSecretKey: "client_secret"

    ingress:
      enabled: false

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    podSecurityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      fsGroupChangePolicy: OnRootMismatch

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 1001
      runAsGroup: 1001

    livenessProbe:
      httpGet:
        path: /_health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 3
      failureThreshold: 5

    readinessProbe:
      httpGet:
        path: /_health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 3
      failureThreshold: 5
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: outline-valkey
  namespace: outline
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: valkey
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: flux-system
      version: 0.9.4
  values:
    fullnameOverride: outline-valkey
    image:
      tag: 9.0.2-alpine3.23@sha256:68677f85c863830af7836ff07c4a13b7f085ebeff62f4dedb71499ca27d229f2
    auth:
      enabled: false
    dataStorage:
      enabled: true
      requestedSize: 2Gi
      className: longhorn-ephemeral
    replica:
      enabled: false
    service:
      type: ClusterIP
      port: 6379
