---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: outline
spec:
  interval: 24h
  retryInterval: 2m
  timeout: 8m
  path: ./apps/outline/outline/resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: outline
  dependsOn:
    - name: cluster-secrets
      namespace: flux-system
    - name: traefik
      namespace: traefik
    - name: longhorn
      namespace: longhorn
    - name: cloudnative-pg-operator
      namespace: cloudnative-pg
  postBuild:
    substituteFrom:
      - kind: Secret
        name: ingress-secrets-system
        optional: false