---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vaultwarden
spec:
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  path: ./apps/vaultwarden/vaultwarden/resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: vaultwarden
  dependsOn:
    - name: external-secrets-cluster
      namespace: external-secrets
    - name: traefik
      namespace: traefik
  postBuild:
    substituteFrom:
      - kind: Secret
        name: vaultwarden-secrets
        optional: false
      - kind: Secret
        name: cluster-secrets
        optional: false