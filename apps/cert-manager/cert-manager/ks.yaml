---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
spec:
  interval: 24h
  retryInterval: 30s
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/cert-manager/cert-manager/resources
  prune: false
  wait: true
  targetNamespace: cert-manager
  dependsOn:
    - name: external-secrets-cluster
      namespace: external-secrets
  postBuild:
    substitute:
      quote: '"'
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
        optional: false
      - kind: Secret
        name: cert-manager-substitution
        optional: false
