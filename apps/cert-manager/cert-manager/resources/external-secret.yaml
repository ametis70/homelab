---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-secrets
  namespace: cert-manager
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: cert-manager-secrets
  data:
    - secretKey: cloudflare-token
      remoteRef:
        key: /cert-manager/CLOUDFLARE_TOKEN
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-substitution
  namespace: cert-manager
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: cert-manager-substitution
  data:
    - secretKey: EMAIL
      remoteRef:
        key: /cert-manager/EMAIL
