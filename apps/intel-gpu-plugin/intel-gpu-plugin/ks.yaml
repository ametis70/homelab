---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intel-gpu-plugin
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/intel-gpu-plugin/intel-gpu-plugin/resources
  prune: false
  wait: true
  targetNamespace: intel-gpu-plugin
  dependsOn:
    - name: nfd
      namespace: nfd
    - name: cert-manager
      namespace: cert-manager

