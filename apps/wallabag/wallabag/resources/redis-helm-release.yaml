apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wallabag-redis
  namespace: wallabag
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: redis
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      version: 25.3.11
  values:
    fullnameOverride: wallabag-redis
    architecture: standalone
    auth:
      enabled: false
    master:
      persistence:
        enabled: true
        existingClaim: wallabag-redis
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          memory: 256Mi
