apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: calibre
  name: calibre-web
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 4.6.2
  values:
    controllers:
      calibre-web:
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            runAsNonRoot: true
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/bjw-s-labs/calibre-web
              tag: 0.6.26@sha256:c9b5adf24d17345bec76104d2ce976464f61bb491d3cecad77fc8e7bb3eaa125
            env:
              TZ: "America/Argentina/Buenos_Aires"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8083
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
    service:
      app:
        controller: calibre-web
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: calibre-web-config
        globalMounts:
          - path: /config
      books:
        existingClaim: calibre-books-pvc
        globalMounts:
          - path: /books
      downloads:
        existingClaim: calibre-downloads-pvc
        globalMounts:
          - path: /downloads
