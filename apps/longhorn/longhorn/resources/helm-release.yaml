---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: longhorn
      version: 1.10.2
  interval: 24h0m0s
  values:
    defaultBackupStore:
      backupTarget: "nfs://truenas.lan:/mnt/backup/longhorn"
    persistence:
      reclaimPolicy: Retain
