---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
  namespace: longhorn
spec:
  interval: 24h
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/longhorn/longhorn/resources
  prune: false
  wait: true
  dependsOn:
    - name: snapshot-controller
      namespace: kube-system
    - name: external-secrets-cluster
      namespace: external-secrets
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
        optional: false
