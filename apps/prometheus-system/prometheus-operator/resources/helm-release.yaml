---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator
  namespace: prometheus-system
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      version: 83.4.0
  interval: 24h0m0s
  values:
    # Prometheus Operator configuration
    prometheusOperator:
      resources:
        limits:
          cpu: 200m
          memory: 200Mi
        requests:
          cpu: 100m
          memory: 100Mi

    # Prometheus configuration
    prometheus:
      prometheusSpec:
        # Reduced retention for high-res data (30s scrapes)
        # Recording rules provide 5m and 15m aggregates for 30d
        retention: 7d
        retentionSize: 7GB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-ephemeral
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 8Gi
        # Reduced resource requests after aggressive metric filtering
        # Expected cardinality drop: 375k → ~50-80k series
        resources:
          requests:
            memory: 512Mi
            cpu: 100m
          limits:
            memory: 1Gi
            cpu: 250m

    # Alertmanager configuration
    alertmanager:
      enabled: true

    grafana:
      enabled: false
      # Deploy only dashboards/ConfigMaps for consumption by Grafana Operator
      forceDeployDashboards: true
      defaultDashboardsEnabled: true

    # Enable essential monitoring components with metric filtering
    prometheus-node-exporter:
      enabled: true
      prometheus:
        monitor:
          metricRelabelings:
            # Drop ARP, netstat, and conntrack details (rarely used)
            - sourceLabels: [__name__]
              regex: 'node_(arp_entries|netstat_.*|nf_conntrack_.*)'
              action: drop
            # Drop tmpfs/devtmpfs filesystem metrics
            - sourceLabels: [__name__, fstype]
              regex: 'node_filesystem_.*;(tmpfs|devtmpfs|overlay)'
              action: drop
            # Drop detailed network interface stats
            - sourceLabels: [__name__]
              regex: 'node_network_(receive|transmit)_packets_total'
              action: drop
            # Drop detailed timex metrics
            - sourceLabels: [__name__]
              regex: 'node_timex_.*'
              action: drop

    kube-state-metrics:
      enabled: true
      prometheus:
        monitor:
          metricRelabelings:
            # Drop label/annotation metrics (huge cardinality, rarely queried)
            - sourceLabels: [__name__]
              regex: 'kube_.*_(labels|annotations)'
              action: drop
            # Drop created timestamps (not typically used)
            - sourceLabels: [__name__]
              regex: 'kube_.*_created'
              action: drop
    
    # Add metric filtering to kubelet scrapes
    kubelet:
      serviceMonitor:
        metricRelabelings:
          # Drop ALL histogram buckets from kubelet (massive cardinality reduction)
          - sourceLabels: [__name__]
            regex: '.*_bucket'
            action: drop
          # Drop container filesystem metrics (biggest storage consumer)
          - sourceLabels: [__name__]
            regex: 'container_fs_.*'
            action: drop
          # Drop detailed network protocol metrics
          - sourceLabels: [__name__]
            regex: 'container_network_(tcp|udp)_usage_total'
            action: drop
          # Drop blkio detailed metrics (use aggregates instead)
          - sourceLabels: [__name__]
            regex: 'container_blkio_device_usage_total'
            action: drop
          # Drop container spec metrics (mostly static)
          - sourceLabels: [__name__]
            regex: 'container_spec_.*'
            action: drop
          # Drop container file descriptors
          - sourceLabels: [__name__]
            regex: 'container_file_descriptors'
            action: drop
          # Drop container sockets
          - sourceLabels: [__name__]
            regex: 'container_sockets'
            action: drop
          # Drop container processes (use container_tasks_state instead)
          - sourceLabels: [__name__]
            regex: 'container_processes'
            action: drop
          # Drop container threads (use container_tasks_state instead)
          - sourceLabels: [__name__]
            regex: 'container_threads.*'
            action: drop

    # Add aggressive filtering for kubeApiServer metrics
    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          # Drop ALL histogram buckets (apiserver_request_duration_seconds_bucket = 54k series!)
          - sourceLabels: [__name__]
            regex: '(apiserver_.*|etcd_.*)_bucket'
            action: drop
          # Keep only the _count and _sum from histograms (enough for rate/avg calculations)
          # Drop detailed SLI buckets
          - sourceLabels: [__name__]
            regex: 'apiserver_request_sli_duration_seconds_bucket'
            action: drop
          # Drop watch event size buckets
          - sourceLabels: [__name__]
            regex: 'apiserver_watch_events_sizes_bucket'
            action: drop
          # Drop body/response size buckets
          - sourceLabels: [__name__]
            regex: 'apiserver_(request_body_size_bytes|response_sizes)_bucket'
            action: drop
          # Drop audit event sizes
          - sourceLabels: [__name__]
            regex: 'apiserver_audit_event_total'
            action: drop
          # Drop detailed authentication metrics
          - sourceLabels: [__name__]
            regex: 'apiserver_authentication_.*'
            action: drop
          # Drop detailed authorization metrics
          - sourceLabels: [__name__]
            regex: 'apiserver_authorization_.*'
            action: drop
          # Drop admission controller webhook buckets
          - sourceLabels: [__name__]
            regex: 'apiserver_admission_.*_bucket'
            action: drop
          # Drop etcd request buckets (39k series!)
          - sourceLabels: [__name__]
            regex: 'etcd_request_duration_seconds_bucket'
            action: drop
          # Drop etcd db size buckets
          - sourceLabels: [__name__]
            regex: 'etcd_db_total_size_in_bytes_bucket'
            action: drop

    # Add aggressive filtering for kubeControllerManager metrics
    kubeControllerManager:
      serviceMonitor:
        metricRelabelings:
          # Drop ALL histogram buckets
          - sourceLabels: [__name__]
            regex: '.*_bucket'
            action: drop
          # Drop detailed workqueue metrics
          - sourceLabels: [__name__]
            regex: 'workqueue_(queue_duration|work_duration)_seconds_bucket'
            action: drop

    # Add aggressive filtering for kubeScheduler metrics
    kubeScheduler:
      serviceMonitor:
        metricRelabelings:
          # Drop ALL histogram buckets
          - sourceLabels: [__name__]
            regex: '.*_bucket'
            action: drop

    # Add aggressive filtering for kubeEtcd metrics
    kubeEtcd:
      serviceMonitor:
        metricRelabelings:
          # Drop ALL histogram buckets
          - sourceLabels: [__name__]
            regex: '.*_bucket'
            action: drop

