---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator
  namespace: prometheus-system
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      version: 82.10.3
  interval: 24h0m0s
  values:
    # Prometheus Operator configuration
    prometheusOperator:
      resources:
        limits:
          cpu: 200m
          memory: 200Mi
        requests:
          cpu: 100m
          memory: 100Mi

    # Prometheus configuration
    prometheus:
      prometheusSpec:
        # Reduced retention for high-res data (30s scrapes)
        # Recording rules provide 5m and 15m aggregates for 30d
        retention: 7d
        retentionSize: 7GB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-ephemeral
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 8Gi
        # Increased memory limits (was at 94% usage)
        resources:
          requests:
            memory: 768Mi
            cpu: 250m
          limits:
            memory: 1536Mi
            cpu: 500m

    # Alertmanager configuration
    alertmanager:
      enabled: true

    grafana:
      enabled: false
      # Deploy only dashboards/ConfigMaps for consumption by Grafana Operator
      forceDeployDashboards: true
      defaultDashboardsEnabled: true

    # Enable essential monitoring components with metric filtering
    prometheus-node-exporter:
      enabled: true
      prometheus:
        monitor:
          metricRelabelings:
            # Drop ARP, netstat, and conntrack details (rarely used)
            - sourceLabels: [__name__]
              regex: 'node_(arp_entries|netstat_.*|nf_conntrack_.*)'
              action: drop
            # Drop tmpfs/devtmpfs filesystem metrics
            - sourceLabels: [__name__, fstype]
              regex: 'node_filesystem_.*;(tmpfs|devtmpfs|overlay)'
              action: drop
            # Drop detailed network interface stats
            - sourceLabels: [__name__]
              regex: 'node_network_(receive|transmit)_packets_total'
              action: drop
            # Drop detailed timex metrics
            - sourceLabels: [__name__]
              regex: 'node_timex_.*'
              action: drop

    kube-state-metrics:
      enabled: true
      prometheus:
        monitor:
          metricRelabelings:
            # Drop label/annotation metrics (huge cardinality, rarely queried)
            - sourceLabels: [__name__]
              regex: 'kube_.*_(labels|annotations)'
              action: drop
            # Drop created timestamps (not typically used)
            - sourceLabels: [__name__]
              regex: 'kube_.*_created'
              action: drop
    
    # Add metric filtering to kubelet scrapes
    kubelet:
      serviceMonitor:
        metricRelabelings:
          # Drop container filesystem metrics (biggest storage consumer)
          - sourceLabels: [__name__]
            regex: 'container_fs_.*'
            action: drop
          # Drop detailed network protocol metrics
          - sourceLabels: [__name__]
            regex: 'container_network_(tcp|udp)_usage_total'
            action: drop
          # Drop blkio detailed metrics (use aggregates instead)
          - sourceLabels: [__name__]
            regex: 'container_blkio_device_usage_total'
            action: drop
