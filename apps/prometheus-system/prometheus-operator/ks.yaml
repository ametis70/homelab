---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/prometheus-system/prometheus-operator/resources
  prune: false
  wait: true
  targetNamespace: prometheus-system
  dependsOn:
    - name: external-secrets-cluster
      namespace: external-secrets
    - name: longhorn
      namespace: longhorn
    - name: grafana
      namespace: grafana
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
        optional: false
