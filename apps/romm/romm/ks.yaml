---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: romm
spec:
  interval: 24h
  retryInterval: 2m
  timeout: 8m
  path: ./apps/romm/romm/resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: romm
  dependsOn:
    - name: cluster-secrets
    - name: traefik
    - name: longhorn
    - name: cloudnative-pg-operator
  postBuild:
    substituteFrom:
      - kind: Secret
        name: ingress-secrets-system
        optional: false