apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: media
  name: jellyfin
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 4.6.2
  values:
    controllers:
      jellyfin:
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            runAsNonRoot: true
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups:
              - 44   # video group for GPU access
              - 105  # render group for GPU access
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: intel.feature.node.kubernetes.io/gpu
                        operator: In
                        values:
                          - "true"
        containers:
          app:
            image:
              repository: jellyfin/jellyfin
              tag: 10.11.8
            env:
              TZ: "America/Argentina/Buenos_Aires"
              JELLYFIN_PublishedServerUrl: "https://jellyfin.${DOMAIN}"
              # Intel GPU (iHD driver) configuration
              LIBVA_DRIVER_NAME: "iHD"
              INTEL_MEDIA_RUNTIME: "1"
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                add:
                  - SETUID
                  - SETGID
            resources:
              requests:
                gpu.intel.com/i915: 1000m
              limits:
                gpu.intel.com/i915: 1000m
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probes
    service:
      app:
        controller: jellyfin
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: jellyfin-config
        globalMounts:
          - path: /config
      movies:
        existingClaim: media-movies-pvc
        globalMounts:
          - path: /media/movies
      tv:
        existingClaim: media-tv-pvc
        globalMounts:
          - path: /media/tv
      transcodes:
        type: emptyDir
        globalMounts:
          - path: /config/transcodes
            subPath: transcodes
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
      # Intel GPU device access for hardware transcoding
      dri:
        type: hostPath
        hostPath: /dev/dri
        hostPathType: Directory
        globalMounts:
          - path: /dev/dri
