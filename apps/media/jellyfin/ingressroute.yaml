apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: media
spec:
  routes:
    - match: Host(`jellyfin.${TLD}`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: authentik
      services:
        - name: jellyfin
          port: 8096

