---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: beets
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/media/beets/resources
  prune: false
  wait: true
  dependsOn:
    - name: external-secrets-cluster
      namespace: external-secrets
    - name: traefik
      namespace: traefik
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
        optional: false
