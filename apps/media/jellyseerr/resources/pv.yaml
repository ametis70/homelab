apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyseerr-config
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: driver.longhorn.io
    volumeHandle: jellyseerr-config
  claimRef:
    namespace: media
    name: jellyseerr-config
