apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: deemix
  namespace: media
spec:
  routes:
    - match: Host(`deemix.${DOMAIN}`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: authentik
      services:
        - name: deemix
          port: 6595

