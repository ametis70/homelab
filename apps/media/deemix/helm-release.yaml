apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: media
  name: deemix
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 4.2.0
  values:
    controllers:
      deemix:
        containers:
          app:
            image:
              repository: ghcr.io/bambanah/deemix
              tag: v4.3.5@sha256:0283c880795eaa65c8f105b2916f3c8030ed2c57dea2c74fc89f6e59c5d27856
            env:
              TZ: "America/Argentina/Buenos_Aires"
              PUID: 568
              PGID: 568
              DEEMIX_MUSIC_DIR: "/downloads/deemix"
              DISABLE_OWNERSHIP_CHECK: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 6595
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
    service:
      app:
        controller: deemix
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: deemix-config
        globalMounts:
          - path: /config
      downloads:
        existingClaim: media-downloads-pvc
        globalMounts:
          - path: /downloads
