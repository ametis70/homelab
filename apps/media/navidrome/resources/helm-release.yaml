apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: media
  name: navidrome
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 4.6.2
  values:
    controllers:
      navidrome:
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            runAsNonRoot: true
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/navidrome/navidrome
              tag: 0.61.2
            env:
              TZ: "America/Argentina/Buenos_Aires"
              ND_PORT: "4533"
              ND_DATAFOLDER: "/data"
              ND_MUSICFOLDER: "/music"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 4533
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
    service:
      app:
        controller: navidrome
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: navidrome-config
        globalMounts:
          - path: /data
      music:
        existingClaim: media-music-pvc
        globalMounts:
          - path: /music
