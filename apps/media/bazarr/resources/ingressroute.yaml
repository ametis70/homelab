apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bazarr
  namespace: media
spec:
  routes:
    - match: Host(`bazarr.${DOMAIN}`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: authentik
      services:
        - name: bazarr
          port: 6767

