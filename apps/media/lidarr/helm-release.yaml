apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: media
  name: lidarr
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 4.2.0
  values:
    controllers:
      lidarr:
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            runAsNonRoot: true
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/lidarr
              tag: 2.13.2@sha256:af72fba52ef9e438a8c010f77a43bb3910da7c31cbf30d90cbcf0b351a82d4d6
            env:
              TZ: "America/Argentina/Buenos_Aires"
              LIDARR__AUTH__METHOD: "External"
              LIDARR__AUTH__REQUIRED: "DisabledForLocalAddresses"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 8686
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
    service:
      app:
        controller: lidarr
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: lidarr-config
        globalMounts:
          - path: /config
      music:
        existingClaim: media-music-pvc
        globalMounts:
          - path: /music
      downloads:
        existingClaim: media-downloads-pvc
        globalMounts:
          - path: /downloads
