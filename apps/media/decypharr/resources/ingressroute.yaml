apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: decypharr
  namespace: media
spec:
  routes:
    - match: Host(`decypharr.${DOMAIN}`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: authentik
      services:
        - name: decypharr
          port: 8282
