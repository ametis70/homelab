apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: media
  name: cleanuparr
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 4.6.2
  values:
    controllers:
      cleanuparr:
        pod:
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/cleanuparr/cleanuparr
              tag: 2.1.5@sha256:426dd3037e5eee10e344ba2ddb31db9d7038f069a764fae54144cb979337fb72
            env:
              TZ: "America/Argentina/Buenos_Aires"
              PORT: 11011
              PUID: 568
              PGID: 568
              UMASK: "022"
              BASE_PATH:
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 11011
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes

    service:
      app:
        controller: cleanuparr
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: cleanuparr-config
        globalMounts:
          - path: /config
