apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cleanuparr
  namespace: media
spec:
  routes:
    - match: Host(`cleanuparr.${DOMAIN}`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: authentik
      services:
        - name: cleanuparr
          port: 11011
