---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: grafana-operator
spec:
  chart:
    spec:
      chart: grafana-operator
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: grafana-operator
      version: 5.22.0
  interval: 24h0m0s
  values:
    leaderElect: true
    logging:
      level: info
      encoder: console
    enforceCacheLabels: safe
