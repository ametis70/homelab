---
# Private network (VLAN 10)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: private-vlan10
  namespace: network-reflector
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "vlan10",
      "mode": "bridge",
      "ipam": {
        "type": "static",
        "addresses": [
          { "address": "10.0.10.11/24" }
        ],
        "routes": [
          { "dst": "0.0.0.0/0", "gw": "10.0.10.1" },
          { "dst": "224.0.0.0/4" }
        ]
      }
    }
