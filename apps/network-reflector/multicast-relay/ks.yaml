---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multicast-relay
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/network-reflector/multicast-relay/resources
  prune: true
  wait: true
  dependsOn:
    - name: multus-cni
      namespace: multus-cni
