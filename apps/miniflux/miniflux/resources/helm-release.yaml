---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miniflux
  namespace: miniflux
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 5.0.1
  values:
    controllers:
      miniflux:
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: miniflux/miniflux
              tag: "2.3.2@sha256:cd353a6af9ce663291f405eddef26fa0d567f486b521c5d34e3fb50e41938b9a"
            env:
              TZ: "America/Argentina/Buenos_Aires"
              RUN_MIGRATIONS: "1"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: pg-secrets
                    key: DATABASE_URL
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: 8080
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes

    service:
      app:
        controller: miniflux
        ports:
          http:
            port: 8080
