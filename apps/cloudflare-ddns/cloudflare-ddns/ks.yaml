---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflare-ddns
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/cloudflare-ddns/cloudflare-ddns/resources
  prune: false
  wait: true
  dependsOn:
    - name: cluster-secrets
      namespace: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cloudflare-ddns-secrets-system
        optional: false
