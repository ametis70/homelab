---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: thanos-query
  namespace: thanos-system
spec:
  routes:
    - match: Host(`thanos.${TLD}`)
      priority: 10
      services:
        - name: thanos-query
          port: http
      middlewares:
        - name: authentik
          namespace: authentik
