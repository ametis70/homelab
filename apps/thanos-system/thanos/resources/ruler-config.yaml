apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-ruler-config
  namespace: thanos-system
data:
  rules.yaml: |
    groups:
      - name: thanos.rules
        rules:
          - alert: ThanosRulerDown
            expr: up{job="thanos-ruler"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Thanos Ruler is down"
              description: "Thanos Ruler has been down for more than 5 minutes."

          - alert: ThanosRulerHighErrorRate
            expr: rate(thanos_rule_evaluation_failures_total[5m]) > 0.1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Thanos Ruler has high error rate"
              description: "Thanos Ruler is experiencing a high rate of rule evaluation failures."

          - alert: ThanosRulerHighLatency
            expr: histogram_quantile(0.95, rate(thanos_rule_evaluation_duration_seconds_bucket[5m])) > 30
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Thanos Ruler has high latency"
              description: "Thanos Ruler rule evaluation latency is above 30 seconds."

      - name: cluster.rules
        rules:
          - alert: HighCPUUsage
            expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on {{ $labels.instance }}"
              description: "CPU usage is above 80% on {{ $labels.instance }}"

          - alert: HighMemoryUsage
            expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.instance }}"
              description: "Memory usage is above 85% on {{ $labels.instance }}"

          - alert: HighDiskUsage
            expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High disk usage on {{ $labels.instance }}"
              description: "Disk usage is above 85% on {{ $labels.mountpoint }}"

      - name: kubernetes.rules
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Pod {{ $labels.pod }} is restarting {{ printf \"%.2f\" $value }} times / 5 minutes."

          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} is not ready"
              description: "Node {{ $labels.node }} has been not ready for more than 5 minutes." 
