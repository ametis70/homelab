---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: thanos
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/thanos-system/thanos/resources
  prune: false
  wait: true
  targetNamespace: thanos-system
  dependsOn:
    - name: cluster-secrets
      namespace: flux-system
    - name: helm-repositories
      namespace: flux-system
    - name: longhorn
      namespace: longhorn
  postBuild:
    substituteFrom:
      - kind: Secret
        name: ingress-secrets-system
        optional: false
