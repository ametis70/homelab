---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: ${PROJECT_ID}
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: gcp-secret-manager
            namespace: external-secrets
            key: credentials.json
