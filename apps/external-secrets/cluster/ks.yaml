---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-cluster
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 30s
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/external-secrets/cluster/resources
  prune: true
  wait: true
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
  postBuild:
    substituteFrom:
      - kind: Secret
        name: external-secrets-project
        optional: false
