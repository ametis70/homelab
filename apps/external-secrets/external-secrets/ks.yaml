---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 30s
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/external-secrets/external-secrets/resources
  prune: true
  wait: true
  targetNamespace: external-secrets
