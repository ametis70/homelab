---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: inventree-admin
  namespace: inventree
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: inventree-admin
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: INVENTREE_ADMIN_USER
      remoteRef:
        key: inventree_ADMIN_USER
    - secretKey: INVENTREE_ADMIN_PASSWORD
      remoteRef:
        key: inventree_ADMIN_PASSWORD
    - secretKey: INVENTREE_ADMIN_EMAIL
      remoteRef:
        key: inventree_ADMIN_EMAIL
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: inventree-db
  namespace: inventree
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: inventree-db
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: inventree_DB_USERNAME
    - secretKey: password
      remoteRef:
        key: inventree_DB_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: inventree-valkey-auth
  namespace: inventree
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: inventree-valkey-auth
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: inventree_VALKEY_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: inventree-email
  namespace: inventree
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: inventree-email
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: INVENTREE_EMAIL_USERNAME
      remoteRef:
        key: inventree_MAIL_USERNAME
    - secretKey: INVENTREE_EMAIL_PASSWORD
      remoteRef:
        key: inventree_MAIL_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: inventree-sso
  namespace: inventree
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: inventree-sso
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        providers: |
          {
            "openid_connect": {
              "APPS": [
                {
                  "provider_id": "authentik",
                  "name": "Log in via Authentik",
                  "client_id": "{{ .client_id }}",
                  "secret": "{{ .client_secret }}",
                  "settings": {
                    "server_url": "https://authentik.${DOMAIN}/application/o/inventree"
                  }
                }
              ]
            }
          }
  data:
    - secretKey: client_id
      remoteRef:
        key: inventree_OIDC_CLIENT_ID
    - secretKey: client_secret
      remoteRef:
        key: inventree_OIDC_CLIENT_SECRET
