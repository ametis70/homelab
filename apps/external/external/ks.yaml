apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-external
  namespace: flux-system
spec:
  interval: 24h0m0s
  retryInterval: 1m
  timeout: 5m
  wait: true
  path: ./apps/external/external/resources
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: external-secrets-cluster
      namespace: external-secrets
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
        optional: false
