---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: isponsorblocktv
spec:
  interval: 24h
  retryInterval: 2m
  timeout: 8m
  path: ./apps/adblock/isponsorblocktv/resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: adblock
  dependsOn:
    - name: external-secrets-cluster
      namespace: external-secrets
    - name: longhorn
      namespace: longhorn
    - name: multus-cni
      namespace: multus-cni
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
        optional: false
