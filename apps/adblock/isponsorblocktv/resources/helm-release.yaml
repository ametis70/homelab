apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: adblock
  name: isponsorblocktv
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 4.6.2
  values:
    controllers:
      isponsorblocktv:
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: iot-vlan20
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/dmunozv04/isponsorblocktv
              tag: v2.6.1@sha256:545856523283753ebcf4b400a46895b9906844be5265a0f4cab98a6b0bdf84be
            env:
              TZ: "America/Argentina/Buenos_Aires"
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                add:
                  - NET_ADMIN
                  - NET_RAW
                  - NET_BROADCAST
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
          # Setup container - exec into this to run: python /app/main.pyc setup
          # kubectl exec -it -n adblock -c setup <pod-name> -- python /app/main.pyc setup
          setup:
            image:
              repository: ghcr.io/dmunozv04/isponsorblocktv
              tag: v2.6.1@sha256:545856523283753ebcf4b400a46895b9906844be5265a0f4cab98a6b0bdf84be
            command:
              - /bin/sh
              - -c
              - |
                echo "iSponsorBlockTV Setup Container"
                echo "================================"
                echo ""
                echo "To run the graphical setup wizard (recommended):"
                echo "  kubectl exec -it -n adblock -c setup <pod-name> -- python /app/main.pyc setup"
                echo ""
                echo "To run the CLI setup:"
                echo "  kubectl exec -it -n adblock -c setup <pod-name> -- python /app/main.pyc setup-cli"
                echo ""
                echo "Container ready for exec..."
                sleep infinity
            env:
              TZ: "America/Argentina/Buenos_Aires"
              TERM: "xterm-256color"
            stdin: true
            tty: true
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                add:
                  - NET_ADMIN
                  - NET_RAW
                  - NET_BROADCAST
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    persistence:
      config:
        existingClaim: isponsorblocktv-config
        globalMounts:
          - path: /app/data
