---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: isponsorblocktv
  namespace: adblock
spec:
  values:
    controllers:
      isponsorblocktv:
        containers:
          # Setup container - exec into this to run: python /app/main.pyc setup
          # kubectl exec -it -n adblock -c setup <pod-name> -- python /app/main.pyc setup
          setup:
            image:
              repository: ghcr.io/dmunozv04/isponsorblocktv
              tag: v2.9.0@sha256:5b8cfa805cb60b99a9e83a2df62d41c63865a315f7ee7cfed1a78052d93650b6
            command:
              - /bin/sh
              - -c
              - |
                echo "iSponsorBlockTV Setup Container"
                echo "================================"
                echo ""
                echo "To run the graphical setup wizard (recommended):"
                echo "  kubectl exec -it -n adblock -c setup <pod-name> -- python /app/main.pyc setup"
                echo ""
                echo "To run the CLI setup:"
                echo "  kubectl exec -it -n adblock -c setup <pod-name> -- python /app/main.pyc setup-cli"
                echo ""
                echo "Container ready for exec..."
                sleep infinity
            env:
              TZ: "America/Argentina/Buenos_Aires"
              TERM: "xterm-256color"
            stdin: true
            tty: true
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                add:
                  - NET_ADMIN
                  - NET_RAW
                  - NET_BROADCAST
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
