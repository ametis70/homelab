---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: alloy
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  path: ./apps/alloy/alloy/resources
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: cluster-secrets
      namespace: flux-system
    - name: traefik
      namespace: traefik
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
        optional: false
