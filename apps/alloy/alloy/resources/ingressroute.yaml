apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alloy-dashboard
  namespace: alloy
spec:
  routes:
    - match: Host(`alloy.${DOMAIN}`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: authentik
      services:
        - name: alloy
          port: 12345

