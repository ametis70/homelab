apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mail-tls-certificate-rsa
  namespace: mail
spec:
  secretName: mail-tls-certificate-rsa
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  dnsNames:
    - "${DOMAIN}"
    - "mail.${DOMAIN}"
  issuerRef:
    name: letsencrypt-clusterissuer
    kind: ClusterIssuer
