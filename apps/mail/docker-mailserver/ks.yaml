---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: docker-mailserver
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/mail/docker-mailserver/resources
  targetNamespace: mail
  prune: false
  wait: true
  dependsOn:
    - name: cluster-secrets
      namespace: flux-system
    - name: cert-manager
      namespace: cert-manager
    - name: traefik
      namespace: traefik
  postBuild:
    substituteFrom:
      - kind: Secret
        name: docker-mailserver-secrets-system
        optional: false
