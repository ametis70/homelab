apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: homebox
  name: homebox
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 4.6.2
  valuesFrom:
    - kind: Secret
      name: pg-secrets
      valuesKey: password
      targetPath: controllers.homebox.containers.app.env.HBOX_DATABASE_PASSWORD
    - kind: Secret
      name: pg-secrets
      valuesKey: username
      targetPath: controllers.homebox.containers.app.env.HBOX_DATABASE_USERNAME
    - kind: Secret
      name: auth-secrets
      valuesKey: client_id
      targetPath: controllers.homebox.containers.app.env.HBOX_OIDC_CLIENT_ID
    - kind: Secret
      name: auth-secrets
      valuesKey: client_secret
      targetPath: controllers.homebox.containers.app.env.HBOX_OIDC_CLIENT_SECRET
  values:
    controllers:
      homebox:
        containers:
          app:
            image:
              repository: ghcr.io/sysadminsmedia/homebox
              tag: 0.26.2
            env:
              TZ: "America/Argentina/Buenos_Aires"
              HBOX_LOG_LEVEL: info
              HBOX_LOG_FORMAT: text
              HBOX_WEB_MAX_UPLOAD_SIZE: 10
              HBOX_OPTIONS_ALLOW_REGISTRATION: "true"
              HBOX_OPTIONS_TRUST_PROXY: "true"
              HBOX_DATABASE_DRIVER: postgres
              HBOX_DATABASE_HOST: homebox-postgres-rw
              HBOX_DATABASE_PORT: "5432"
              HBOX_DATABASE_DATABASE: homebox
              HBOX_DATABASE_SSL_MODE: disable
              # OIDC Configuration
              HBOX_OIDC_ENABLED: "true"
              HBOX_OIDC_ISSUER_URL: "https://authentik.${DOMAIN}/application/o/homebox/"
              HBOX_OIDC_AUTO_REDIRECT: "true"
              HBOX_OPTIONS_ALLOW_LOCAL_LOGIN: "false"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/status
                    port: &port 7745
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probes
    service:
      app:
        controller: homebox
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: homebox-data
        globalMounts:
          - path: /data
