---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 45s
  timeout: 4m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/authentik/authentik/resources
  prune: false
  wait: true
  dependsOn:
    - name: cluster-secrets
      namespace: flux-system
    - name: traefik
      namespace: traefik
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
        optional: false
