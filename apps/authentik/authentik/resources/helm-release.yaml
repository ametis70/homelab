---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  chart:
    spec:
      chart: authentik
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: authentik
      version: 2026.2.2
  interval: 24h0m0s
  values:
    global:
      envFrom:
        - secretRef:
            name: authentik-secrets
      env:
        - name: AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS
          value: "10.0.0.0/8,192.168.0.0/16,172.16.0.0/12"

    authentik:
      error_reporting:
        enabled: true
      email:
        host: "mail.${DOMAIN}"
        port: 465
        username: "authentik@${DOMAIN}"
        use_tls: false
        use_ssl: true
        timeout: 30
        from: "Authentik <authentik@${DOMAIN}>"

    server:
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - "authentik.${DOMAIN}"

    postgresql:
      enabled: true
      auth:
        existingSecret: authentik-secrets
        secretKeys:
          adminPasswordKey: POSTGRES_PASSWORD
          userPasswordKey: POSTGRES_PASSWORD
          replicationPasswordKey: POSTGRES_PASSWORD
      primary:
        persistence:
          size: 1Gi

    redis:
      enabled: true
      master:
        persistence:
          size: 1Gi
          storageClass: longhorn-ephemeral
