---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: notification
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/notification/notification/resources
  prune: false
  wait: true
  dependsOn:
    - name: cluster-secrets
    - name: traefik
  postBuild:
    substituteFrom:
      - kind: Secret
        name: ingress-secrets-system
        optional: false
