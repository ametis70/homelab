# metadata:
#   name: webhook-receiver
#   namespace: flux-system
# spec:
#   entryPoints:
#     - websecure
#   routes:
#     - match: Host(`fluxcd.${DOMAIN}`) && PathPrefix(`/hook/`)
#       kind: Rule
#       services:
#         - name: webhook-receiver
#           port: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webhook-receiver
  namespace: flux-system
spec:
  rules:
    - host: fluxcd.${DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: webhook-receiver
                port:
                  number: 80
