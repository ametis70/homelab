apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: nextcloud
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
  values:
    image:
      flavor: apache

    # Temporary fix for PHP 8.4 TypeError in Nextcloud 33.0.2 with LDAP authentication
    # This patches /var/www/html/lib/private/Config/UserConfig.php line 688
    # to add (string) type casting before strtolower() call
    # Reference: https://github.com/nextcloud/server/issues/58421
    # TODO: Remove this when upgrading to Nextcloud 33.0.3 or later
    lifecycle:
      postStartCommand:
        - /bin/sh
        - -c
        - |
          # Wait for Nextcloud initialization to complete
          echo "[PHP 8.4 Fix] Waiting for Nextcloud files to be ready..."
          for i in $(seq 1 30); do
            if [ -f /var/www/html/lib/private/Config/UserConfig.php ]; then
              echo "[PHP 8.4 Fix] Nextcloud files detected."
              break
            fi
            echo "[PHP 8.4 Fix] Waiting... ($i/30)"
            sleep 2
          done
          
          TARGET_FILE="/var/www/html/lib/private/Config/UserConfig.php"
          
          if [ ! -f "$TARGET_FILE" ]; then
            echo "[PHP 8.4 Fix] ERROR: Target file not found after waiting!"
            exit 0
          fi
          
          # Check if already patched
          if grep -q '(string)\$this->getTypedValue' "$TARGET_FILE"; then
            echo "[PHP 8.4 Fix] Already applied, skipping."
            exit 0
          fi
          
          # Apply the fix
          echo "[PHP 8.4 Fix] Applying fix to line 688..."
          sed -i '688s/strtolower(\$this->getTypedValue/strtolower((string)\$this->getTypedValue/' "$TARGET_FILE"
          
          # Verify the fix was applied
          if grep -q '(string)\$this->getTypedValue' "$TARGET_FILE"; then
            echo "[PHP 8.4 Fix] ✓ Fix applied successfully!"
          else
            echo "[PHP 8.4 Fix] WARNING: Fix may not have been applied correctly."
          fi

    nginx:
      enabled: false

    nextcloud:
      host: nextcloud.${DOMAIN}

      existingSecret:
        enabled: true
        secretName: nextcloud-admin
        usernameKey: username
        passwordKey: password
        smtpHostKey: smtp-host
        smtpUsernameKey: smtp-username
        smtpPasswordKey: smtp-password

      mail:
        enabled: true
        fromAddress: nextcloud@${DOMAIN}
        domain: ${DOMAIN}
        smtp:
          secure: ssl
          port: 465
          authtype: LOGIN

      podSecurityContext:
        fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"

      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_proxies' => array(
              0 => '10.42.0.0/16',
              1 => '10.43.0.0/16',
            ),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
            'overwriteprotocol' => 'https',
          );
        custom.config.php: |-
          <?php
          $CONFIG = array (
            'maintenance_window_start' => 1,
            'default_phone_region' => 'AR',
            'instanceid' => 'nextcloud-homelab',
            'allow_local_remote_servers' => true,
          );

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-postgres-rw:5432
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-db
        usernameKey: username
        passwordKey: password

    redis:
      enabled: false

    externalRedis:
      enabled: true
      host: nextcloud-valkey
      port: 6379
      existingSecret:
        enabled: true
        secretName: nextcloud-valkey-auth
        passwordKey: password

    ingress:
      enabled: false

    cronjob:
      enabled: true
      type: sidecar

    phpClientHttpsFix:
      enabled: true
      protocol: https

    persistence:
      enabled: true
      existingClaim: nextcloud-config
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data
