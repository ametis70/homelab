apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: nextcloud
      version: 9.1.3
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
  values:
    image:
      flavor: apache

    nginx:
      enabled: false

    nextcloud:
      host: nextcloud.${DOMAIN}

      existingSecret:
        enabled: true
        secretName: nextcloud-admin
        usernameKey: username
        passwordKey: password
        smtpHostKey: smtp-host
        smtpUsernameKey: smtp-username
        smtpPasswordKey: smtp-password

      mail:
        enabled: true
        fromAddress: nextcloud@${DOMAIN}
        domain: ${DOMAIN}
        smtp:
          secure: ssl
          port: 465
          authtype: LOGIN

      podSecurityContext:
        fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"

      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_proxies' => array(
              0 => '10.42.0.0/16',
              1 => '10.43.0.0/16',
            ),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
            'overwriteprotocol' => 'https',
          );
        custom.config.php: |-
          <?php
          $CONFIG = array (
            'maintenance_window_start' => 1,
            'default_phone_region' => 'AR',
            'instanceid' => 'nextcloud-homelab',
            'allow_local_remote_servers' => true,
          );

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-postgres-rw:5432
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-db
        usernameKey: username
        passwordKey: password

    redis:
      enabled: false

    externalRedis:
      enabled: true
      host: nextcloud-valkey
      port: 6379
      existingSecret:
        enabled: true
        secretName: nextcloud-valkey-auth
        passwordKey: password

    ingress:
      enabled: false

    cronjob:
      enabled: true
      type: sidecar

    startupProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1

    phpClientHttpsFix:
      enabled: true
      protocol: https

    persistence:
      enabled: true
      existingClaim: nextcloud-config
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-valkey
  namespace: nextcloud
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: valkey
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: flux-system
      version: 0.10.0
  values:
    image:
      tag: 9.0.2-alpine3.23@sha256:68677f85c863830af7836ff07c4a13b7f085ebeff62f4dedb71499ca27d229f2
    auth:
      enabled: true
      usersExistingSecret: "nextcloud-valkey-auth"
      aclUsers:
        default:
          permissions: "~* &* +@all"
          passwordKey: "password"
    dataStorage:
      enabled: true
      requestedSize: 2Gi
      className: longhorn-ephemeral
    replica:
      enabled: false
    service:
      type: ClusterIP
      port: 6379
