apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nextcloud-ingress
  namespace: nextcloud
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: "Host(`nextcloud.${DOMAIN}`)"
      priority: 10
      middlewares:
        - name: nextcloud-headers
      services:
        - name: nextcloud
          port: 8080
