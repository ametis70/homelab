---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-admin
  namespace: nextcloud
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: nextcloud-admin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: /nextcloud/ADMIN_USERNAME
    - secretKey: password
      remoteRef:
        key: /nextcloud/ADMIN_PASSWORD
    - secretKey: smtp-host
      remoteRef:
        key: /nextcloud/MAIL_HOST
    - secretKey: smtp-username
      remoteRef:
        key: /nextcloud/MAIL_USERNAME
    - secretKey: smtp-password
      remoteRef:
        key: /nextcloud/MAIL_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-db
  namespace: nextcloud
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: nextcloud-db
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: /nextcloud/DB_USERNAME
    - secretKey: password
      remoteRef:
        key: /nextcloud/DB_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-valkey-auth
  namespace: nextcloud
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: nextcloud-valkey-auth
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: /nextcloud/VALKEY_PASSWORD
