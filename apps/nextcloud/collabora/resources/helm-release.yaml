---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: collabora
  namespace: nextcloud
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: collabora-online
      sourceRef:
        kind: HelmRepository
        name: collabora
        namespace: nextcloud
      version: "1.1.*"
  values:
    collabora:
      aliasgroups:
        - host: "https://nextcloud.${DOMAIN}"
          aliases: []
      
      extra_params: "--o:ssl.enable=false --o:ssl.termination=true"
      
      server_name: "collabora.${DOMAIN}"
      
      existingSecret:
        enabled: true
        secretName: collabora-admin
        usernameKey: username
        passwordKey: password
    
    ingress:
      enabled: false
    
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
    
    autoscaling:
      enabled: false
    
    replicaCount: 1
    
    probes:
      startup:
        enabled: false
      readiness:
        enabled: true
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 10
        successThreshold: 1
        failureThreshold: 3
      liveness:
        enabled: true
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 10
        successThreshold: 1
        failureThreshold: 5
