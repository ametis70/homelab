---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onlyoffice-rabbitmq
  namespace: nextcloud
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      onlyoffice-rabbitmq:
        containers:
          app:
            image:
              repository: docker.io/library/rabbitmq
              tag: 4@sha256:bed2f282e7cdc2ee0a3353f41f40a791a335040877315e685d1610e9fb226c30
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: onlyoffice-rabbitmq
        ports:
          rabbitmq:
            port: 5672
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onlyoffice
  namespace: nextcloud
spec:
  interval: 24h0m0s
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  dependsOn:
    - name: onlyoffice-rabbitmq
  valuesFrom:
    - kind: Secret
      name: pg-secrets
      valuesKey: username
      targetPath: controllers.onlyoffice.containers.app.env.DB_USER
    - kind: Secret
      name: pg-secrets
      valuesKey: password
      targetPath: controllers.onlyoffice.containers.app.env.DB_PWD
  values:
    controllers:
      onlyoffice:
        containers:
          app:
            image:
              repository: docker.io/onlyoffice/documentserver
              tag: 9.3.1@sha256:53a06109f1f4029a78f913a061e14f01bff023d109024073a13d4416b54d2195
            env:
              DB_TYPE: postgres
              DB_HOST: onlyoffice-postgres-rw
              DB_PORT: "5432"
              DB_NAME: onlyoffice
              AMQP_URI: amqp://guest:guest@onlyoffice-rabbitmq
              JWT_ENABLED: "true"
              JWT_HEADER: Authorization
            envFrom:
              - secretRef:
                  name: onlyoffice-jwt
            probes:
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: 80
                  failureThreshold: 30
                  periodSeconds: 10
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: 80
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: 80
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
    service:
      app:
        controller: onlyoffice
        ports:
          http:
            port: 80
    persistence:
      data:
        existingClaim: onlyoffice-data
        globalMounts:
          - path: /var/www/onlyoffice/Data/certs
          - path: /var/www/onlyoffice/Data
          - path: /var/log/onlyoffice
          - path: /var/lib/onlyoffice/documentserver/App_Data/cache/files
          - path: /var/www/onlyoffice/documentserver-example/public/files
          - path: /usr/share/fonts
