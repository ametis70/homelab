---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: onlyoffice
  namespace: nextcloud
spec:
  interval: 24h0m0s
  timeout: 5m0s
  retryInterval: 1m0s
  path: ./apps/nextcloud/onlyoffice/resources
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: nextcloud
  dependsOn:
    - name: external-secrets-cluster
      namespace: external-secrets
    - name: traefik
      namespace: traefik
    - name: cloudnative-pg-operator
      namespace: cloudnative-pg
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
