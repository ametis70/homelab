apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-certificate
  namespace: traefik
spec:
  dnsNames:
    - ${quote}*.${DOMAIN}${quote}
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-clusterissuer
  secretName: wildcard-tls
---
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik
spec:
  defaultCertificate:
    secretName: wildcard-tls
