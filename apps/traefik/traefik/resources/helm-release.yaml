---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  chart:
    spec:
      chart: traefik
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: traefik
      version: 41.0.2
  interval: 24h0m0s
  values:
    api:
      dashboard: true
      insecure: false
    service:
      annotations:
        kube-vip.io/loadbalancerIPs: 10.0.30.100
      spec:
        type: LoadBalancer
        externalTrafficPolicy: Local
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
    log:
      format: json
    accessLog:
      enabled: true
      format: json
    ports:
      web:
        forwardedHeaders:
          trustedIPs:
            - "10.0.0.0/8"
            - "192.168.0.0/16"
            - "172.16.0.0/12"
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        forwardedHeaders:
          trustedIPs:
            - "10.0.0.0/8"
            - "192.168.0.0/16"
            - "172.16.0.0/12"
