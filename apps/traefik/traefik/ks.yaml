---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik
spec:
  interval: 24h
  retryInterval: 30s
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/traefik/traefik/resources
  prune: false
  wait: true
  targetNamespace: traefik
  dependsOn:
    - name: cluster-secrets
      namespace: flux-system
    - name: cert-manager
      namespace: cert-manager
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
        optional: false
