---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  path: ./apps/loki/loki/resources
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

