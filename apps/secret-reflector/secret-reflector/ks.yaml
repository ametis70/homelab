---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: secret-reflector
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 30s
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/secret-reflector/secret-reflector/resources
  prune: true
  wait: true
  dependsOn:
    - name: cluster-secrets
      namespace: flux-system
