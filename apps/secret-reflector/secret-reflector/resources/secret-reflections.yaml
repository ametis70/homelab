# Job to add reflection annotations to existing secrets in flux-system
# This runs after secrets are unsealed and adds the annotations needed for reflection

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-annotator
  namespace: flux-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-annotator
  namespace: flux-system
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-annotator
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-annotator
subjects:
- kind: ServiceAccount
  name: secret-annotator
  namespace: flux-system

---
apiVersion: batch/v1
kind: Job
metadata:
  name: secret-annotator
  namespace: flux-system
spec:
  template:
    spec:
      serviceAccountName: secret-annotator
      restartPolicy: Never
      containers:
      - name: annotator
        image: bitnami/kubectl:latest
        command: ["/bin/bash"]
        args:
          - -c
          - |
            # Add reflector annotations to secrets
            
            # cert-manager-secrets-system -> cert-manager namespace  
            kubectl annotate secret cert-manager-secrets-system \
              reflector.v1.k8s.emberstack.com/reflection-allowed="true" \
              reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces="cert-manager" \
              reflector.v1.k8s.emberstack.com/reflection-auto-enabled="true" \
              --overwrite || true
              
            # vaultwarden-secrets-system -> vaultwarden namespace
            kubectl annotate secret vaultwarden-secrets-system \
              reflector.v1.k8s.emberstack.com/reflection-allowed="true" \
              reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces="vaultwarden" \
              reflector.v1.k8s.emberstack.com/reflection-auto-enabled="true" \
              --overwrite || true
              
            # docker-mailserver-secrets-system -> mail namespace
            kubectl annotate secret docker-mailserver-secrets-system \
              reflector.v1.k8s.emberstack.com/reflection-allowed="true" \
              reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces="mail" \
              reflector.v1.k8s.emberstack.com/reflection-auto-enabled="true" \
              --overwrite || true
              
            echo "All secrets annotated for reflection"
