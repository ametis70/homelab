apiVersion: v1
kind: Service
metadata:
  name: external-nas
  namespace: traefik
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-nas
  namespace: traefik
subsets:
  - addresses:
      - ip: 10.0.30.40
    ports:
      - name: http
        port: 80
        protocol: TCP
