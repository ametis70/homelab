apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-helm-repositories
  namespace: flux-system
spec:
  interval: 24h0m0s
  retryInterval: 1m
  timeout: 5m
  wait: true
  path: ./infrastructure/helm-charts
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
