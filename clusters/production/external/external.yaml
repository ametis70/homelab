apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-external
  namespace: flux-system
spec:
  interval: 24h0m0s
  retryInterval: 1m
  timeout: 5m
  wait: true
  path: ./external
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cluster-secrets
    - name: infrastructure-sealed-secrets
  postBuild:
    substituteFrom:
      - kind: Secret
        name: ingress-secrets-system
        optional: false
