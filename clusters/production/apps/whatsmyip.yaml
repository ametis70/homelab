---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: whatsmyip
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/whatsmyip
  prune: true
  wait: true
  dependsOn:
    - name: infrastructure-traefik
  postBuild:
    substituteFrom:
      - kind: Secret
        name: ingress-secrets-system
        optional: false 