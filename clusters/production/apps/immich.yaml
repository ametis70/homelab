---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-immich
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/immich
  prune: false
  wait: true
  dependsOn:
    - name: cluster-secrets
    - name: infrastructure-traefik
    - name: infrastructure-cloudnative-pg-operator
  postBuild:
    - kind: Secret
      name: ingress-secrets-system
      optional: false

