---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-intel-gpu-plugin
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/intel-gpu-plugin
  prune: true
  wait: true
  dependsOn:
    - name: infrastructure-nfd
    - name: infrastructure-cert-manager

