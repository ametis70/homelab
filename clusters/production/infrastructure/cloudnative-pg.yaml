apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cloudnative-pg-operator
  namespace: flux-system
spec:
  path: ./infrastructure/cloudnative-pg
  prune: false
  sourceRef:
    kind: GitRepository
    name: homelab
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  wait: true

