apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cloudnative-pg-operator
  namespace: flux-system
spec:
  path: ./infrastructure/cloudnative-pg
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 24h
  retryInterval: 1m
  timeout: 8m
  wait: true
