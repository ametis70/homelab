---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-grafana
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/grafana
  prune: true
  wait: true
  dependsOn:
    - name: infrastructure-grafana-operator
  postBuild:
    substituteFrom:
      - kind: Secret
        name: ingress-secrets-system
        optional: false
