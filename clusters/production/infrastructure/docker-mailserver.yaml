---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-docker-mailserver
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/docker-mailserver
  prune: false
  wait: true
  dependsOn:
    - name: cluster-secrets
    - name: infrastructure-cert-manager
    - name: infrastructure-traefik
  postBuild:
    substituteFrom:
      - kind: Secret
        name: docker-mailserver-secrets-system
        optional: false
