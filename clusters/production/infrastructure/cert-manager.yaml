---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cert-manager
  namespace: flux-system
spec:
  interval: 24h
  retryInterval: 30s
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/cert-manager
  prune: false
  wait: true
  dependsOn:
    - name: cluster-secrets
  postBuild:
    substitute:
      quote: '"'
    substituteFrom:
      - kind: Secret
        name: cert-manager-secrets-system
        optional: false
